name: CI/CD Pipeline – SAP Migration Assessment Agent

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.12"
  IMAGE_NAME: sap-migration-agent

jobs:
  # ── Lint & Format ────────────────────────────────────────────────────────────
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install linting deps
        run: pip install ruff mypy

      - name: Ruff lint
        run: ruff check sap-migration-agent/

      - name: Ruff format check
        run: ruff format --check sap-migration-agent/

  # ── Tests ────────────────────────────────────────────────────────────────────
  test:
    name: Unit & Integration Tests
    runs-on: ubuntu-latest
    needs: lint

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: sap_agent
          POSTGRES_PASSWORD: sap_agent
          POSTGRES_DB: sap_migration
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          cd sap-migration-agent
          pip install -r requirements.txt

      - name: Run tests
        working-directory: sap-migration-agent
        env:
          SAP_USE_MOCK: "true"
          DATABASE_URL: "postgresql+asyncpg://sap_agent:sap_agent@localhost:5432/sap_migration"
          DATABASE_URL_SYNC: "postgresql://sap_agent:sap_agent@localhost:5432/sap_migration"
          OPENAI_API_KEY: "sk-dummy-test-key"
          REPORTS_OUTPUT_DIR: "/tmp/reports"
        run: |
          pytest tests/ -v --cov=app --cov-report=xml --cov-report=term-missing \
            --cov-fail-under=80

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: sap-migration-agent/coverage.xml
          fail_ci_if_error: false

  # ── Docker Build ─────────────────────────────────────────────────────────────
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: ./sap-migration-agent
          file: ./sap-migration-agent/docker/Dockerfile.api
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}-api:latest
            ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./sap-migration-agent
          file: ./sap-migration-agent/docker/Dockerfile.frontend
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}-frontend:latest
            ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}-frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
